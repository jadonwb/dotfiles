# Prefix
unbind C-b
set-option -g prefix 'C-s'
bind-key 'C-s' send-prefix

# Reload config
bind r source-file /home/jadon/.config/rmux/rmux.conf \; \
	display-message "Reloaded rmux.conf"

# Extra theme colors
source-file /home/jadon/.config/omarchy/current/theme/tmux.theme


# Vi for copy mode
setw -g mode-keys vi
bind-key -n 'M-v' copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Tabs (windows) and panes
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-x kill-pane
bind -n M-X kill-window
bind -n M-t new-window
bind -n M-T new-session
bind -n M-r command-prompt -p "Rename window:" "rename-window '%%'"
bind -n M-R command-prompt -p "Rename session:" "rename-session '%%'"

# Splits bindings
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Keybinding help
bind ? display-popup -E -w 80% -h 70% -T "Tmux keybindings" "/home/jadon/.local/share/omarchy/bin/omarchy-menu-tmux-keybindings --print | less -R"

# Resize key-bindings
bind-key -n 'C-left' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-left' 'resize-pane -L 1'
bind-key -n 'C-down' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-down' 'resize-pane -D 1'
bind-key -n 'C-up' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-up' 'resize-pane -U 1'
bind-key -n 'C-right' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-right' 'resize-pane -R 1'

bind-key -T copy-mode-vi 'C-left' resize-pane -L 1
bind-key -T copy-mode-vi 'C-down' resize-pane -D 1
bind-key -T copy-mode-vi 'C-up' resize-pane -U 1
bind-key -T copy-mode-vi 'C-right' resize-pane -R 1


# Navigation key-bindings
bind-key -n 'C-h' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-h' 'if -F "#{pane_at_left}" "" "select-pane -L"'
bind-key -n 'C-j' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-j' 'if -F "#{pane_at_bottom}" "" "select-pane -D"'
bind-key -n 'C-k' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-k' 'if -F "#{pane_at_top}" "" "select-pane -U"'
bind-key -n 'C-l' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 'send-keys C-l' 'if -F "#{pane_at_right}" "" "select-pane -R"'

bind-key -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'

# Switch windows
bind-key -n 'M-p' previous-window
bind-key -n 'M-n' next-window
bind-key -n 'M-Left' swap-window -t -1\; select-window -t -1
bind-key -n 'M-Right' swap-window -t +1\; select-window -t +1
bind-key -n 'M-b' last-window
bind-key -n 'M-l' run-shell "sesh last"

# Zoom in/out panes
bind -n 'M-z' resize-pane -Z

set -s default-terminal "tmux-256color"
# set -as terminal-features ',*:RGB'
set -g status-keys vi
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -s escape-time 0
set -s focus-events on
set -s set-clipboard on
setw -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -s extended-keys on
set -s extended-keys-format csi-u

# Render undercurls and double underlines
# set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# setw -g popup-style 'bg=default,fg=default'
# setw -g popup-border-style "fg=blue"
# setw -g popup-border-lines 'rounded'
# setw -g copy-mode-selection-style "fg=default,bg=#{@selection_bg}"
# setw -g pane-border-lines single
# setw -g pane-border-indicators both
# setw -g pane-border-status off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
# setw -g window-status-separator ""
# setw -g automatic-rename on
# setw -g automatic-rename-format '#{b:pane_current_path}:#{pane_current_command}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
setw -g window-status-format "#[fg=brightblack] #I:#W "
setw -g window-status-current-format "#[fg=blue,bold] #I:#W "
setw -g pane-border-style "fg=brightblack"
setw -g pane-active-border-style "fg=blue"
# setw -g message-style "bg=default,fg=blue"
# setw -g message-command-style "bg=default,fg=blue"
setw -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

