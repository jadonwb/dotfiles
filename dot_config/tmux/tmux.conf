if-shell '[ "#{host}" = "ws205" ]' \
    'set-option -g default-shell /usr/bin/zsh'

# Prefix
unbind C-b
set-option -g prefix 'C-s'
bind-key 'C-s' send-prefix

# Reload tmux config
bind r source-file ~/.tmux.conf \; \
	display-message "Reloaded the config"

# Extra theme colors
source-file ~/.config/omarchy/current/theme/tmux.theme

# Vi for copy mode
setw -g mode-keys vi
bind-key -n 'M-v' copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Tabs (windows) and panes
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-x kill-pane
bind -n M-X kill-window
bind -n M-t new-window
bind -n M-T new-session
bind -n M-r command-prompt -p "Rename window:" "rename-window '%%'"
bind -n M-R command-prompt -p "Rename session:" "rename-session '%%'"

# Splits bindings
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Keybinding help
bind ? display-popup -E -w 80% -h 70% -T "Tmux keybindings" "omarchy-menu-tmux-keybindings --print | less -R"

# Helper
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Resize key-bindings
bind-key -n 'C-left' if-shell "$is_vim" 'send-keys C-left'  'resize-pane -L 1'
bind-key -n 'C-down' if-shell "$is_vim" 'send-keys C-down'  'resize-pane -D 1'
bind-key -n 'C-up' if-shell "$is_vim" 'send-keys C-up'  'resize-pane -U 1'
bind-key -n 'C-right' if-shell "$is_vim" 'send-keys C-right'  'resize-pane -R 1'

bind-key -T copy-mode-vi 'C-left' resize-pane -L 1
bind-key -T copy-mode-vi 'C-down' resize-pane -D 1
bind-key -T copy-mode-vi 'C-up' resize-pane -U 1
bind-key -T copy-mode-vi 'C-right' resize-pane -R 1

# Navigation key-bindings
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }

bind-key -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'

# Switch windows
bind-key -n 'M-p' previous-window
bind-key -n 'M-n' next-window
bind-key -n 'M-Left' swap-window -t -1\; select-window -t -1
bind-key -n 'M-Right' swap-window -t +1\; select-window -t +1

bind-key -n 'M-b' last-window
bind-key -n 'M-l' run-shell "sesh last"

# Zoom in/out panes
bind -n 'M-z' resize-pane -Z

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g status-keys vi
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g extended-keys on
set -g extended-keys-format csi-u

# Render undercurls and double underlines
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g popup-style 'bg=default,fg=default'
set -g popup-border-style "fg=#{@primary}"
set -g popup-border-lines 'rounded'

set -g mode-style "fg=#{@primary},bg=default"
set -g message-style "fg=#{@primary},bg=default"
set -g message-command-style "fg=#{@primary},bg=default"
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=yellow"
set-option -g pane-border-lines single
set-option -g pane-border-indicators both
set-option -g pane-border-status off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}:#{pane_current_command}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=#{@primary},bold] #S #[bg=default] "
set -g status-right "#[fg=#{@primary}]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=#{@primary},bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=#{@primary}"
set -g message-style "bg=default,fg=#{@primary}"
set -g message-command-style "bg=default,fg=#{@primary}"
set -g mode-style "bg=#{@primary},fg=black"
setw -g clock-mode-colour "#{@primary}"

# Plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'trevin-j/tmux-resurrect-nvim'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Sesh
bind-key -n 'M-s' run-shell "sesh connect \"$(
  sesh list -t -c -d --icons | fzf-tmux -p 35%,55% \
    --no-sort --ansi --border-label ' Sessions ' --prompt '⚡  ' \
    --header 'CTRL+a all | CTRL+t tmux | CTRL+f find | CTRL+d kill ' \
    --border rounded \
    --color=border:$TMUX_ACCENT \
    --bind 'alt-s:abort' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list -d --icons)' \
    --bind 'ctrl-t:change-prompt(⚡  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list -t -c -d --icons)' \
)\""

# Sessions
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
# set -g @continuum-boot 'on'
set -g @continuum-save-interval '5'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b "${TMUX_PLUGIN_MANAGER_PATH}tpm/tpm"
