# --- Ristretto Color Definitions (Matched to your Waybar) ---
$base      = rgba(44, 37, 37, 1.0)  # Matches #2c2525
$text      = rgba(230, 217, 219, 1.0) # Matches #e6d9db
$accent    = rgba(249, 204, 108, 1.0) # Ristretto Yellow #f9cc6c
$cyan      = rgba(133, 218, 204, 1.0) # Ristretto Cyan #85dacc
$red       = rgba(253, 104, 131, 1.0) # Ristretto Red #fd6883
$surface   = rgba(89, 89, 89, 0.5)    # Matches border #595959

general {
    ignore_empty_input = true
    disable_loading = true
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/omarchy/current/background
    color = $base
    # Enhanced blur for the "Glass" look
    blur_passes = 4
    blur_size = 8
}

# --- Time (Matches Waybar Clock) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = $text
    font_size = 110
    font_family = JetBrainsMono Nerd Font SemiBold
    position = 0, 220
    halign = center
    valign = center
}

# --- Date (Uses Ristretto Yellow like Workspace 1) ---
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    color = $accent
    font_size = 26
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# --- Profile Image (Zenitsu / Chainsaw) ---
image {
    monitor =
    path = /home/nishant/Pictures/Pic/chainsaw.jpg
    size = 180
    rounding = 14 # Matches Waybar's 14px rounding
    border_size = 4
    border_color = $accent
    position = 0, -30
    halign = center
    valign = center
}

# --- Password Input (Glass Style) ---
input-field {
    monitor =
    size = 350, 65
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    
    # Matching your Waybar Glass styling
    outer_color = $surface
    inner_color = rgba(44, 37, 37, 0.8) # 0.89 alpha sync
    font_color = $text
    
    check_color = $cyan
    fail_color = $red
    
    placeholder_text = <span foreground="##e6d9db">Enter Password...</span>
    hide_input = false
    
    position = 0, -200
    halign = center
    valign = center
    
    # Matches Waybar 14px Rounding
    rounding = 14
}

# --- User Label (Uses Cyan like VM-W) ---
label {
    monitor =
    text = Jadon
    color = $cyan
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -280
    halign = center
    valign = center
}
