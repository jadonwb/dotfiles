[mgr]
# NOTE: can be combined with tmTheme (sublime colorshceme file) for preview code highlight
# syntect_theme = "path/to/tmTheme"

cwd = { fg = "#807EA6", italic = true }

# Hovered
hovered = { bg = "#141238" }
preview_hovered = { bg = "#141238" }

# Find
find_keyword = { fg = "#09081F", bg = "#DC7622", bold = true }
find_position = { fg = "#5A5AC0", bg = "#151435", bold = true }

# Marker
marker_copied = { fg = "#2A8669", bg = "#2A8669" }
marker_cut = { fg = "#ff007c", bg = "#ff007c" }
marker_marked = { fg = "#EB63BD", bg = "#EB63BD" }
marker_selected = { fg = "#4541e1", bg = "#4541e1" }

# Count
count_copied = { fg = "#09081F", bg = "#2A8669" }
count_cut = { fg = "#09081F", bg = "#ff007c" }
count_selected = { fg = "#09081F", bg = "#4541e1" }

# Border
border_symbol = "│"
border_style = { fg = "#4b4aa1" }

# Tab
[tabs]
active = { fg = "#0a0a1e", bg = "#4541e1" }
inactive = { fg = "#4541e1", bg = "#312e55" }

[mode]
normal_main = { fg = "#0a0a1e", bg = "#4541e1", bold = true }
normal_alt = { fg = "#4541e1", bg = "#312e55" }

select_main = { fg = "#0a0a1e", bg = "#EB63BD", bold = true }
select_alt = { fg = "#EB63BD", bg = "#312e55" }

unset_main = { fg = "#0a0a1e", bg = "#EB63BD", bold = true }
unset_alt = { fg = "#EB63BD", bg = "#312e55" }

[status]
overall = { fg = "#c8d3f5", bg = "#09081F" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label = { fg = "#c8d3f5", bold = true }
progress_normal = { fg = "#5A5AC0", bg = "#141238" }
progress_error = { fg = "#C42D49", bg = "#141238" }

# Permissions
perm_type = { fg = "#4541e1" }
perm_read = { fg = "#c99b4a" }
perm_write = { fg = "#ff007c" }
perm_exec = { fg = "#2A8669" }
perm_sep = { fg = "#312e55" }

[pick]
border = { fg = "#4b4aa1" }
active = { fg = "#c8d3f5", bg = "#2c2b63" }
inactive = { fg = "#c8d3f5" }

# Input
[input]
border = { fg = "#5A5AC0" }
title = { fg = "#5A5AC0" }
value = { fg = "#EB63BD" }
selected = { bg = "#2c2b63" }

# Completion
[cmp]
border = { fg = "#5A5AC0" }
active = { fg = "#c8d3f5", bg = "#2a274b" }
inactive = { fg = "#c8d3f5" }

icon_file = ""
icon_folder = ""
icon_command = ""

# Tasks
[tasks]
border = { fg = "#4b4aa1" }
title = { fg = "#4b4aa1" }
hovered = { fg = "#c8d3f5", bg = "#2c2b63" }

# Which
[which]
cols = 3
mask = { bg = "#09081F" }
cand = { fg = "#67c0d7" }
rest = { fg = "#4541e1" }
desc = { fg = "#EB63BD" }
separator = " ➜ "
separator_style = { fg = "#4C4C73" }

# Confirm
[confirm]
border = { fg = "#5A5AC0" }
title = { fg = "#4b4aa1" }
content = {}
list = {}
btn_yes = { bg = "#2c2b63" }
btn_no = {}
btn_labels = ["  [Y]es  ", "  (N)o  "]

# Spot
[spot]
border = { fg = "#4b4aa1" }
title = { fg = "#4b4aa1" }

# Notify
[notify]
title_info = { fg = "#5A5AC0" }
title_warn = { fg = "#c99b4a" }
title_error = { fg = "#C42D49" }

icon_error = ""
icon_warn = ""
icon_info = ""

# Help
[help]
on = { fg = "#2A8669" }
run = { fg = "#EB63BD" }
desc = { fg = "#67c0d7" }
hovered = { bg = "#141238" }
footer = { fg = "#c8d3f5", bg = "#0D0C25" }

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#c99b4a" },

    # Media
    { mime = "{audio,video}/*", fg = "#EB63BD" },

    # Archives
    { mime = "application/*zip", fg = "#ff007c" },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#ff007c" },

    # Documents
    { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#67c0d7" },

    # Empty files
    # { mime = "inode/x-empty", fg = "#ff007c" },

    # Special files
    { name = "*", is = "orphan", bg = "#ff007c" },
    { name = "*", is = "exec", fg = "#2A8669" },

    # Fallback
    { name = "*/", fg = "#4541e1" },
    { name = "*", fg = "#c8d3f5" },
]
