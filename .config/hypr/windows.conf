# From omarchy windows.conf as of 10/5/25
windowrule = suppressevent maximize, class:.*
windowrule = opacity 0.97 0.9, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
source = ~/.config/hypr/apps.conf
#

# My changes
windowrule = opacity 0.97 0.93, tag:chromium-based-browser

# Per app styling
windowrule = opacity 0.8 0.7 override, class:org.gnome.SystemMonitor
windowrule = opacity 0.85 0.7 override, class:org.gnome.Nautilus.*

windowrule = opacity 1 1 override, class:gnome-system-monitor

windowrule = float, class:org.omarchy.terminal
windowrule = center, class:org.omarchy.terminal
windowrule = size 1100 750, class:org.omarchy.terminal

windowrule = float, class:org.omarchy.impala
windowrule = center, class:org.omarchy.impala
windowrule = stayfocused, class:org.omarchy.impala
windowrule = size 1650 1000, class:org.omarchy.impala

windowrule = float, class:org.omarchy.wiremix
windowrule = center, class:org.omarchy.wiremix
windowrule = stayfocused, class:org.omarchy.wiremix
windowrule = size 920 600, class:org.omarchy.wiremix

windowrule = float, class:org.omarchy.bluetui
windowrule = center, class:org.omarchy.bluetui
windowrule = stayfocused, class:org.omarchy.bluetui
windowrule = size 1200 600, class:org.omarchy.bluetui

# Steam
windowrule = opacity 1 1, class:steam
windowrule = float, class:steam, title:Friends List
windowrule = center, class:steam, title:Friends List
windowrule = idleinhibit fullscreen, class:steam
windowrule = opacity 1 1, class:.*[Ss]team.*
windowrule = fullscreen, class:.*steam_app.*

# Else
windowrule = float, tag:floating-window
windowrule = center, tag:floating-window
windowrule = size 1400 900, tag:floating-window

windowrule = tag +floating-window, class:(org.omarchy.btop|org.omarchy.terminal|org.omarchy.bash|org.gnome.NautilusPreviewer|org.gnome.Nautilus|org.gnome.SystemMonitor|com.gabm.satty|Omarchy|About|TUI.float|imv|mpv)
windowrule = tag +floating-window, class:(xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus|org.gnome.SystemMonitor), title:^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)
windowrule = float, class:org.gnome.Calculator

# Fullscreen screensaver
windowrule = fullscreen, class:org.omarchy.screensaver

# No transparency on media windows
windowrule = opacity 1 1, class:^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$

# Popped window rounding
windowrule = rounding 8, tag:pop
